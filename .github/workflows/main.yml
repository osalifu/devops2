name: CI Pipeline

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # --- Python/Flask Setup ---
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Flask Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask

    # --- Node.js Setup ---
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Node Dependencies
      run: npm install

    - name: Run Node Tests
      run: npm test
